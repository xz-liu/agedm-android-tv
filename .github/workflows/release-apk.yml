name: Release APK On Push

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: vars
        shell: bash
        run: |
          branch="${GITHUB_REF_NAME//\//-}"
          short_sha="$(git rev-parse --short HEAD)"
          tag="build-${branch}-${GITHUB_RUN_NUMBER}-${short_sha}"
          apk_name="agedm-tv-debug-${branch}-${short_sha}.apk"

          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "apk_name=$apk_name" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK licenses
        shell: bash
        run: yes | sdkmanager --licenses > /dev/null

      - name: Install required SDK packages
        shell: bash
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Build debug APK
        id: build
        continue-on-error: true
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:assembleDebug

      - name: Prepare APK asset
        shell: bash
        run: |
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            cp app/build/outputs/apk/debug/app-debug.apk "${{ steps.vars.outputs.apk_name }}"
            echo "Using APK built on GitHub Actions."
          elif [ -f release-assets/agedm-tv-debug.apk ]; then
            cp release-assets/agedm-tv-debug.apk "${{ steps.vars.outputs.apk_name }}"
            echo "Using fallback APK committed in repository."
          else
            echo "No APK available to publish." >&2
            exit 1
          fi

      - name: Create GitHub release and upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: APK ${{ steps.vars.outputs.branch }} ${{ steps.vars.outputs.short_sha }}
          target_commitish: ${{ github.sha }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: ${{ steps.vars.outputs.apk_name }}
          fail_on_unmatched_files: true
